[project]
site_name = "Red Hat Docs Agent Tools"
site_description = "Plugins, skills, agents, and commands for Red Hat documentation workflows (Claude Code and Cursor)"
site_url = "https://redhat-documentation.github.io/redhat-docs-agent-tools/"
repo_url = "https://github.com/redhat-documentation/redhat-docs-agent-tools"
edit_uri = "edit/main/docs/"
extra_css = ["stylesheets/extra.css"]
nav = [
    {"Home" = [
        {"Overview" = "index.md"},
        {"Quick start" = "quick-start.md"},
    ]},
    {"Plugins" = [
        {"Browse plugins" = "plugins.md"},
        {"dita-tools" = "plugins/dita-tools.md"},
        {"docs-tools" = "plugins/docs-tools.md"},
        {"hello-world" = "plugins/hello-world.md"},
        {"vale-tools" = "plugins/vale-tools.md"},
    ]},
    {"Install" = [
        {"Installation" = "install/index.md"},
    ]},
    {"Contribute" = [
        {"Contributing" = "contribute/index.md"},
        {"Creating a new plugin" = "contribute/creating-a-new-plugin.md"},
        {"Evaluating skills" = "contribute/evaluating-skills.md"},
        {"Contributing with Cursor" = "contribute/cursor-contributing-tools.md"},
        {"Cursor workflows" = "contribute/cursor-workflows.md"},
    ]},
    {"Get Started with Cursor" = [
        {"Overview" = "get-started/index.md"},
        {"Cursor fundamentals" = "get-started/cursor-fundamentals.md"},
        {"Using Cursor with your documentation" = "get-started/cursor-product-documentation.md"},
    ]},
]

[project.theme]
logo = "images/logo.svg"
favicon = "images/favicon.png"
features = [
    "navigation.tabs",
    "navigation.tabs.sticky",
    "navigation.sections",
    "navigation.expand",
    "content.action.edit",
    "content.action.view",
    "content.code.copy",
    "content.code.annotate",
    "navigation.footer"
]

[project.extra.status]
new = "Recently added"

# Palette toggle for automatic mode
[[project.theme.palette]]
scheme = "default"
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

# Palette toggle for light mode
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

# Palette toggle for dark mode
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]
[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.details]