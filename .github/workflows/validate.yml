name: Validate script syntax
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate script syntax
        run: ./scripts/validate-plugins.sh
