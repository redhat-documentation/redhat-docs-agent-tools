language: en-US
early_access: false
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: true
  pre_merge_checks:
    custom_checks:
      - name: "No Real People Names in Style References"
        mode: error
        instructions: |
          Never allow references to real people by name in:
          - Plugin commands
          - Skill documentation
          - Example prompts or instructions
          - Style references (e.g., "in the style of <person>")

          Instead, require explicit descriptions of desired qualities (e.g., "direct and technically precise"
          instead of "like <specific person>").

          Flag ANY instance where a real person's name is used as a style reference or example.

      - name: "Git Safety Rules"
        mode: error
        instructions: |
          ## No assumed git remote names
          Code should NEVER assume git remote names like "origin" or "upstream" without first discovering them.

          Bad: `git push origin main`, `git fetch upstream`, `git remote add origin <url>`
          Good: `git remote -v` to discover remotes first, `git branch -vv` to check tracking branches

          Flag any hardcoded remote name usage in commands, skills, or documentation.

          ## Git push safety
          1. Commands and skills must NEVER push without explicit user permission
          2. NEVER allow pushing to main or master branches
          - Reject `git push <remote> main` or `git push <remote> master`
          3. NEVER allow force push operations anywhere
          - Reject `git push -f`, `git push --force`, `git push --force-with-lease`

          Flag any git push without user confirmation, any push to main/master, or any force push.

      - name: "No Untrusted MCP Servers"
        mode: error
        instructions: |
          Code should NEVER introduce MCP (Model Context Protocol) server installations from untrusted sources.

          Reject:
          - Random npm packages for MCP servers
          - Arbitrary GitHub repositories
          - Unofficial or unverified MCP servers
          - Any `npx @<random-org>/mcp-server-*` installations

          Flag any introduction of new MCP server dependencies and require justification and security review.

      - name: "Skill and Script Conventions"
        mode: error
        instructions: |
          ## Fully qualified skill names
          All skill references must use fully qualified `plugin:skill` names everywhere:
          agent frontmatter, Skill tool invocations, inline text references, cross-references.

          Good: `docs-tools:jira-reader`, `docs-tools:rh-ssg-formatting`, `vale-tools:lint-with-vale`
          Bad: `jira-reader` (missing prefix), `/jira-reader --issue PROJ-123` (old slash-command syntax)

          Flag any skill reference missing the `plugin:` prefix or using old slash-command syntax.

          ## Script invocation patterns
          Skills calling co-located scripts must use relative paths:
          - `python3 scripts/git_pr_reader.py info <url> --json`

          Cross-skill/command script calls must use `${CLAUDE_PLUGIN_ROOT}`:
          - `python3 ${CLAUDE_PLUGIN_ROOT}/skills/git-pr-reader/scripts/git_pr_reader.py`

          Knowledge-only skills (checklists, review rules) must use `Skill:` pseudocode:
          - `Skill: docs-tools:rh-ssg-formatting, args: "review path/to/file.adoc"`

          Flag any mismatch between script invocation pattern and context.

      - name: "Plugin Registry Consistency"
        mode: error
        instructions: |
          ## Marketplace sync
          When a PR modifies any `plugins/*/.claude-plugin/plugin.json` file, verify that
          `.claude-plugin/marketplace.json` at the repo root is also updated to match.

          Check that plugin name, version, and description match between plugin.json and
          marketplace.json. New plugins must be registered in marketplace.json.

          Flag any PR that changes plugin.json without corresponding marketplace.json updates.

          ## Plugin overlap detection
          When a PR adds or significantly modifies plugin files (plugins/*/commands/*.md,
          plugins/*/skills/*.md, plugins/*/agents/*.md), check for overlapping functionality.

          1. List open PRs that also modify plugin files
          2. Compare PR titles and modified file paths for semantic similarity
          3. Check against existing commands, skills, and agents in the repository
          4. Flag if similarity >= 60% with any existing content

          Semantic equivalents: "analyze"~"inspect", "review"~"check"~"audit", "generate"~"create"

          HIGH (>=85%): Flag immediately with recommendation to consolidate
          MODERATE (60-84%): Flag with recommendation to differentiate
          LOW (<60%): Pass silently

    tools:
      shellcheck:
        enabled: true
      yamllint:
        enabled: true
      markdownlint:
        enabled: true

chat:
  auto_reply: true
